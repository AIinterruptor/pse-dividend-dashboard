name: Daily PSE Dividend Update

on:
  schedule:
    # Run 8AM Manila time (00:00 UTC) on weekdays
    - cron: '0 0 * * 1-5'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper
        run: python scraper.py

      - name: Inject data into dashboard
        run: python inject_data.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --cached --quiet || git commit -m "chore: daily dividend update $(date -u +%Y-%m-%d)"
          git push
